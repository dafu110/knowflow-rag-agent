services:
  knowflow:
    build: .
    ports:
      - "127.0.0.1:8765:8765"
    env_file:
      - .env
    environment:
      KNOWFLOW_AUTH_TOKENS: ${KNOWFLOW_AUTH_TOKENS:?Set KNOWFLOW_AUTH_TOKENS in .env before starting Compose}
    volumes:
      - knowflow-data:/app/data
    restart: unless-stopped

volumes:
  knowflow-data:
